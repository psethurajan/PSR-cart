<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — PSR-Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/products.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">PSR-Card</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
        aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto ms-3">
          <li class="nav-item"><a class="nav-link " href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active-page" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link " href="wishlist.html">Wishlist</a></li>
          <li class="nav-item"><a class="nav-link" id="nav-login-link" href="login.html">Login</a></li>
        </ul>
        <div class="navbar-right">
          <div id="nav-user-wrap"></div>
          <a href="wishlist.html" class="nav-icon-btn" title="Wishlist">
            <i class="bi bi-heart"></i>
            <span class="badge" id="wishlist-count">0</span>
          </a>
          <a href="cart.html" class="nav-icon-btn" title="Cart">
            <i class="bi bi-cart3"></i>
            <span class="badge" id="cart-count">0</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="products-page-header">
    <div class="container">
      <h2>All Products</h2>
      <p style="color:#888;">Explore our full collection</p>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="container">
    <div class="filter-bar">
      <input type="text" class="search-input" placeholder="Search products..." oninput="handleSearch(this.value)">
      <div class="d-flex flex-wrap gap-2">
        <button class="filter-btn active" onclick="filterByCategory('All', this)">All</button>
        <button class="filter-btn" onclick="filterByCategory('Sneakers', this)">Sneakers</button>
        <button class="filter-btn" onclick="filterByCategory('Mobiles', this)">Mobiles</button>
        <button class="filter-btn" onclick="filterByCategory('Gaming', this)">Gaming</button>
        <button class="filter-btn" onclick="filterByCategory('Audio', this)">Audio</button>
        <button class="filter-btn" onclick="filterByCategory('Gadgets', this)">Gadgets</button>
        <button class="filter-btn" onclick="filterByCategory('Fashion', this)">Fashion</button>
      </div>
      <select class="sort-select" onchange="handleSort(this.value)">
        <option value="default">Sort By</option>
        <option value="low-high">Price: Low to High</option>
        <option value="high-low">Price: High to Low</option>
        <option value="rating">Top Rated</option>
      </select>
    </div>
  </div>

  <!-- PRODUCT GRID -->
  <div class="container py-3 pb-5">
    <div class="row" id="products-grid"></div>
  </div>

  <!-- PRODUCT DETAIL MODAL -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="modal-title">Product Name</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-5">
              <img id="modal-img" src="" alt="" class="modal-product-img">
            </div>
            <div class="col-md-7">
              <span class="product-category" id="modal-category"></span>
              <div class="modal-price mt-2" id="modal-price"></div>
              <div class="mt-1" style="color:#f0a500;">
                <i class="bi bi-star-fill"></i>
                <span id="modal-rating"></span> / 5
              </div>
              <p class="mt-3" style="color:#aaa;font-size:0.9rem;" id="modal-desc"></p>
              <p class="fw-semibold mt-3 mb-1">Specifications:</p>
              <ul class="modal-specs" id="modal-specs"></ul>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-add-cart px-4" id="modal-add-cart" onclick="modalAddToCart()">
            <i class="bi bi-cart-plus me-1"></i> Add to Cart
          </button>
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
