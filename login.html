<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PSR-Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>

  <div class="login-page">

    <!-- LOGIN FORM (shown when not logged in) -->
    <div class="login-card" id="login-section">
      <div class="login-logo">PSR-Card</div>
      <h4>Welcome Back</h4>
      <p class="text-muted-custom">Sign in to your account to continue</p>

      <div class="error-msg" id="error-msg" style="display:none;"></div>
      <div class="success-msg" id="success-msg" style="display:none;">
        <i class="bi bi-check-circle-fill me-2"></i>Login successful! Redirecting...
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="fullname" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrap">
            <input type="password" class="form-input" id="password" placeholder="Min 6 characters">
            <button type="button" id="toggle-password">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check" style="margin:0;">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember" style="color:#888;font-size:0.85rem;">Remember me</label>
          </div>
          <a href="#" style="color:#00e676;font-size:0.85rem;text-decoration:none;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary-custom w-100 mb-3">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
      </form>

      <div class="divider"><span>or</span></div>
      <p class="text-center mt-3" style="color:#888;font-size:0.88rem;">
        Don't have an account?
        <a href="#" style="color:#00e676;text-decoration:none;font-weight:600;">Sign up</a>
      </p>
      <p class="text-center mt-2">
        <a href="index.html" style="color:#888;font-size:0.85rem;text-decoration:none;">
          <i class="bi bi-arrow-left me-1"></i>Back to Home
        </a>
      </p>
    </div>

    <!-- WELCOME SECTION (shown when already logged in) -->
    <div class="login-card text-center" id="welcome-section" style="display:none;">
      <div class="login-logo">PSR-Card</div>
      <div style="font-size:4rem;color:#00e676;margin:20px 0;">
        <i class="bi bi-person-check-fill"></i>
      </div>
      <h4>Welcome back,</h4>
      <h3 style="color:#00e676;font-weight:700;" id="welcome-name">User</h3>
      <p style="color:#888;margin:12px 0 24px;">You are currently logged in to PSR-Card.</p>
      <a href="products.html" class="btn btn-primary-custom w-100 mb-3">
        <i class="bi bi-bag me-2"></i>Continue Shopping
      </a>
      <button id="logout-btn" class="btn btn-outline-custom w-100">
        <i class="bi bi-box-arrow-right me-2"></i>Logout
      </button>
      <p class="mt-3">
        <a href="index.html" style="color:#888;font-size:0.85rem;text-decoration:none;">
          <i class="bi bi-arrow-left me-1"></i>Back to Home
        </a>
      </p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
